<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/css/admin.css">

</head>

<body>
<!-- ===========================
     Admin Navbar
=========================== -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/admin/dashboard">

            🍔 FoodExpress Admin

        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#adminMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="adminMenu">

            <ul class="navbar-nav ms-auto align-items-center">

                <!-- <li class="nav-item">

                    <a href="/admin/dashboard" class="nav-link">

                        📊 Dashboard

                    </a>

                </li> -->

                <li class="nav-item">

                    <a href="/admin/category" class="nav-link">

                        📂 Categories

                    </a>

                </li>

                <li class="nav-item">

                    <a href="/admin/food" class="nav-link">

                        🍕 Foods

                    </a>

                </li>

                <li class="nav-item">

                    <a href="/admin/orders" class="nav-link">

                        📦 Orders

                    </a>

                </li>

                <li class="nav-item">

                    <span id="adminName" class="nav-link text-warning fw-bold">

                    </span>

                </li>

                <li class="nav-item">

                    <button
                        class="btn btn-danger ms-2"
                        onclick="logout()">

                        🚪 Logout

                    </button>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<h2 class="fw-bold">

📊 Admin Dashboard

</h2>

<p class="text-muted mb-0">

Welcome back, manage your restaurant from one place.

</p>

</div>

<a href="/admin/orders" class="btn btn-danger">

View All Orders

</a>

</div>

<h2 class="mb-4">

Dashboard

</h2>

<div class="row">

<div class="col-md-3">

<div class="card shadow-lg border-0 rounded-4 text-bg-primary">

<div class="card-body">

<h5>Total Orders</h5>

<h2 id="totalOrders">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-lg border-0 rounded-4 text-bg-success">

<div class="card-body">

<h5>Total Revenue</h5>

<h2>₹<span id="totalRevenue">0</span></h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-lg border-0 rounded-4 text-bg-info">

<div class="card-body">

<h5>Total Foods</h5>

<h2 id="totalFoods">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-lg border-0 rounded-4 text-bg-info">

<div class="card-body">

<h5>Categories</h5>

<h2 id="totalCategories">0</h2>

</div>

</div>

</div>

</div>

<hr>

<h3 class="mt-4">Recent Orders</h3>

<div class="table-responsive">

<table class="table table-hover align-middle table-bordered">

    <thead class="table-dark">

        <tr>

            <th>Customer</th>
            <th>Phone</th>
            <th>Total</th>
            <th>Status</th>
            <th>Payment</th>
            <th>Date</th>

        </tr>

    </thead>

    <tbody id="recentOrders">

    </tbody>

</table>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/auth.js"></script>

<script src="/js/toast.js"></script>

<script src="/js/dashboard.js"></script>
<script>

if (!user || user.role !== "admin") {

    showToast("Access Denied","error");

    setTimeout(() => {

        window.location.href = "/login";

    },1000);

}

</script>

</body>

</html>
