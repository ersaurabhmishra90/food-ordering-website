<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet" href="/css/register.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🍔 Food Ordering</h1>

        <h2>Create Account</h2>

        <form id="registerForm">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <input
                type="text"
                id="phone"
                placeholder="Phone Number"
            >

            <textarea
                id="address"
                placeholder="Address"
            ></textarea>

            <button type="submit">

                Register

            </button>

        </form>

        <p>

            Already have an account?

            <a href="/login">

                Login

            </a>

        </p>

    </div>

</div>

<script src="/js/register.js"></script>

</body>
</html>
